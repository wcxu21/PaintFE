name: Release

# Runs when you push a tag like v1.0.0
on:
  push:
    tags:
      - "v*"

permissions: read-all

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Windows build ──────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build release
        # .cargo/config.toml applies -C target-feature=+crt-static on Windows,
        # statically linking vcruntime into the EXE — no external C++ dependency
        # (satisfies Microsoft Store policy 10.2.4.1).
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaintFE-windows
          path: target/release/PaintFE.exe

  # ── Linux build ────────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libvulkan-dev \
            libwayland-dev \
            libegl1-mesa-dev \
            libssl-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaintFE-linux
          path: target/release/PaintFE

  # ── AppImage build ─────────────────────────────────────────────────────────
  build-appimage:
    name: Build (AppImage)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libvulkan-dev \
            libwayland-dev \
            libegl1-mesa-dev \
            libssl-dev \
            libfuse2 \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: appimage-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: appimage-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Build AppImage
        run: bash packaging/appimage/build-appimage.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaintFE-appimage
          path: PaintFE-x86_64.AppImage

  # ── macOS build (Apple Silicon — aarch64) ────────────────────────────────────
  build-macos-arm:
    name: Build (macOS Apple Silicon)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-arm-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-arm-cargo-

      - name: Build release
        run: cargo build --release

      - name: Create .dmg
        run: |
          mkdir -p dmg_staging
          cp target/release/PaintFE dmg_staging/
          chmod +x dmg_staging/PaintFE
          hdiutil create -volname "PaintFE" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            PaintFE-macOS-arm64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaintFE-macos-arm64
          path: PaintFE-macOS-arm64.dmg

  # ── macOS build (Intel — x86_64) ──────────────────────────────────────────
  build-macos-x86:
    name: Build (macOS Intel)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-x86-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-x86-cargo-

      - name: Build release (cross-compile for Intel)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create .dmg
        run: |
          mkdir -p dmg_staging
          cp target/x86_64-apple-darwin/release/PaintFE dmg_staging/
          chmod +x dmg_staging/PaintFE
          hdiutil create -volname "PaintFE" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            PaintFE-macOS-x86_64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaintFE-macos-x86_64
          path: PaintFE-macOS-x86_64.dmg

  # ── MSIX build (Microsoft Store submission package) ────────────────────────
  # NOTE: The MSIX is NOT attached to the GitHub Release — it contains
  #       placeholder Publisher info and must be submitted manually via
  #       Partner Center (partner.microsoft.com). Microsoft re-signs it there.
  #       Download the artifact from the Actions tab after each release run,
  #       then upload to Partner Center → Your App → Submissions → New submission.
  build-msix:
    name: Build (MSIX / MS Store)
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: msix-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: msix-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Generate Store icon assets
        shell: powershell
        run: |
          Add-Type -AssemblyName System.Drawing
          & packaging\msix\gen-assets.ps1

      - name: Stage PackageLayout
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path packaging\msix\PackageLayout | Out-Null
          Copy-Item target\release\PaintFE.exe packaging\msix\PackageLayout\
          $tag = "${{ github.ref_name }}".TrimStart('v')
          $ver = "$tag.0"
          # Read raw bytes, strip UTF-8 BOM (EF BB BF) if present, decode, patch, re-encode, write
          $bytes = [System.IO.File]::ReadAllBytes("$PWD\packaging\msix\AppxManifest.xml")
          if ($bytes.Length -ge 3 -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF) {
            $bytes = $bytes[3..($bytes.Length - 1)]
          }
          $src = [System.Text.Encoding]::UTF8.GetString($bytes)
          $src = $src -creplace '(?<=\s)Version="[\d.]+"', "Version=`"$ver`""
          $outBytes = [System.Text.Encoding]::UTF8.GetBytes($src)
          [System.IO.File]::WriteAllBytes("$PWD\packaging\msix\PackageLayout\AppxManifest.xml", $outBytes)
          Copy-Item -Recurse -Force packaging\msix\assets packaging\msix\PackageLayout\assets

      - name: Locate makeappx.exe
        id: find_makeappx
        run: |
          $pf86 = [Environment]::GetFolderPath('ProgramFilesX86')
          $exe = Get-ChildItem "$pf86\Windows Kits\10\bin" `
            -Filter makeappx.exe -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $exe) { Write-Error "makeappx.exe not found"; exit 1 }
          echo "path=$exe" >> $env:GITHUB_OUTPUT

      - name: Pack MSIX
        run: |
          & "${{ steps.find_makeappx.outputs.path }}" `
            pack /d packaging\msix\PackageLayout /p PaintFE.msix /nv

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaintFE-msix-store-submission
          path: PaintFE.msix
          retention-days: 30

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-windows, build-linux, build-appimage, build-macos-arm, build-macos-x86]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: PaintFE-windows
          path: dist/windows

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: PaintFE-linux
          path: dist/linux

      - name: Download AppImage
        uses: actions/download-artifact@v4
        with:
          name: PaintFE-appimage
          path: dist/linux

      - name: Download macOS ARM binary
        uses: actions/download-artifact@v4
        with:
          name: PaintFE-macos-arm64
          path: dist/macos

      - name: Download macOS Intel binary
        uses: actions/download-artifact@v4
        with:
          name: PaintFE-macos-x86_64
          path: dist/macos

      - name: Make binaries executable
        run: |
          chmod +x dist/linux/PaintFE
          chmod +x dist/linux/PaintFE-x86_64.AppImage

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum windows/PaintFE.exe linux/PaintFE linux/PaintFE-x86_64.AppImage \
            macos/PaintFE-macOS-arm64.dmg macos/PaintFE-macOS-x86_64.dmg \
            | sed 's|windows/||; s|linux/||; s|macos/||' \
            > checksums-SHA256.txt
          cat checksums-SHA256.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: PaintFE ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/windows/PaintFE.exe
            dist/linux/PaintFE
            dist/linux/PaintFE-x86_64.AppImage
            dist/macos/PaintFE-macOS-arm64.dmg
            dist/macos/PaintFE-macOS-x86_64.dmg
            dist/checksums-SHA256.txt
